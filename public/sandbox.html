<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoutty Logo Animation Sandbox</title>
    <style>
        body {
            background: #09090b; /* Dark background similar to Zoutty */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .header {
            position: absolute;
            top: 40px;
            text-align: center;
        }

        .header h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 600;
        }

        .header p {
            margin: 0;
            color: #a1a1aa;
            font-size: 14px;
        }

        .controls {
            position: absolute;
            bottom: 40px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 10;
        }

        button {
            padding: 12px 20px;
            background: #27272a;
            color: #f4f4f5;
            border: 1px solid #3f3f46;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        button:hover {
            background: #3f3f46;
        }

        button.active {
            background: #2dd4bf;
            color: #000;
            border-color: #2dd4bf;
            box-shadow: 0 0 15px rgba(45, 212, 191, 0.3);
        }

        .replay-btn {
            background: transparent;
            border: 1px solid #71717a;
            margin-left: 10px;
        }

        .replay-btn:hover {
            background: #3f3f46;
        }

        .sandbox-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px; /* Strong perspective for 3D effects */
        }

        .logo-container {
            width: 180px;
            height: 180px;
            position: relative;
            transform-style: preserve-3d;
        }

        .layer {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
        }

        /* Shadow for extra depth */
        .shadow {
            position: absolute;
            top: 10%; left: 10%; right: -10%; bottom: -10%;
            background: rgba(0,0,0,0.5);
            border-radius: 41.01px;
            filter: blur(20px);
            transform: translateZ(-50px);
            opacity: 0;
            transition: opacity 0.5s;
        }

        /* -------------------------------------
           Concept 1: Isometric Assembly
        ------------------------------------- */
        .anim-1 .shadow {
            animation: c1-shadow 3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        .anim-1 .logo-container {
            animation: c1-container 3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        .anim-1 .logo-z {
            animation: c1-z 3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        
        @keyframes c1-container {
            0% { transform: rotateX(55deg) rotateZ(-45deg) scale(0.6); }
            35% { transform: rotateX(55deg) rotateZ(-45deg) scale(0.6); }
            65% { transform: rotateX(0deg) rotateZ(0deg) scale(1); }
            100% { transform: rotateX(0deg) rotateZ(0deg) scale(1); }
        }
        @keyframes c1-z {
            0% { transform: translateZ(200px); filter: drop-shadow(0px 20px 10px rgba(0,0,0,0.5)); }
            35% { transform: translateZ(0px); filter: drop-shadow(0px 0px 0px rgba(0,0,0,0)); }
            100% { transform: translateZ(0px); filter: drop-shadow(0px 0px 0px rgba(0,0,0,0)); }
        }
        @keyframes c1-shadow {
            0% { opacity: 1; transform: translateZ(-100px); }
            35% { opacity: 1; transform: translateZ(-50px); }
            65% { opacity: 0; transform: translateZ(0px); }
            100% { opacity: 0; }
        }

        /* -------------------------------------
           Concept 2: 3D Coin Flip & Settle
        ------------------------------------- */
        .anim-2 .logo-container {
            animation: c2-container 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; /* Bouncy ease */
        }
        .anim-2 .logo-z {
            transform: translateZ(1px); /* Prevent Z-fighting */
        }
        @keyframes c2-container {
            0% { transform: rotateY(-90deg) scale(0.4); opacity: 0; }
            15% { opacity: 1; }
            100% { transform: rotateY(0deg) scale(1); opacity: 1; }
        }

        /* -------------------------------------
           Concept 3: Dynamic Tilt & Draw
        ------------------------------------- */
        .anim-3 .logo-container {
            animation: c3-container 3.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .anim-3 .logo-box {
            animation: c3-box 3.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        .anim-3 .logo-z path {
            fill: transparent;
            stroke: #fff;
            stroke-width: 3;
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;
            animation: c3-path 3.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes c3-container {
            0% { transform: rotateX(30deg) rotateY(-20deg) scale(0.8); }
            40% { transform: rotateX(30deg) rotateY(-20deg) scale(0.8); }
            70% { transform: rotateX(0deg) rotateY(0deg) scale(1); }
            100% { transform: rotateX(0deg) rotateY(0deg) scale(1); }
        }
        @keyframes c3-box {
            0% { opacity: 0; transform: scale(0.8) translateZ(-40px); }
            40% { opacity: 0; transform: scale(0.8) translateZ(-40px); }
            60% { opacity: 1; transform: scale(1) translateZ(0); }
            100% { opacity: 1; transform: scale(1) translateZ(0); }
        }
        @keyframes c3-path {
            0% { stroke-dashoffset: 2000; fill: transparent; stroke: #fff; }
            40% { stroke-dashoffset: 0; fill: transparent; stroke: #fff; }
            60% { fill: #fff; stroke: transparent; }
            100% { stroke-dashoffset: 0; fill: #fff; stroke: transparent; }
        }

        /* -------------------------------------
           Concept 4: Zoom Through
        ------------------------------------- */
        .anim-4 .logo-container {
            animation: c4-container 2.5s cubic-bezier(0.7, 0, 0.3, 1) forwards;
        }
        @keyframes c4-container {
            0% { transform: rotateX(15deg) scale(0.8); opacity: 0; }
            15% { transform: rotateX(15deg) scale(1); opacity: 1; }
            60% { transform: rotateX(15deg) scale(1); opacity: 1; }
            90% { opacity: 1; }
            100% { transform: rotateX(0deg) scale(20); opacity: 0; }
        }

    </style>
</head>
<body>

    <div class="header">
        <h1>Splash Screen Concepts</h1>
        <p>Select an animation below to preview it.</p>
    </div>

    <div class="sandbox-wrapper" id="sandbox">
        <div class="logo-container" id="logo-container">
            <div class="shadow"></div>
            <!-- Teal Box Layer -->
            <svg class="layer logo-box" viewBox="0 0 191.39 191.39">
                <rect fill="#2dd4bf" width="191.39" height="191.39" rx="41.01" ry="41.01"/>
            </svg>
            <!-- White Z Layer -->
            <svg class="layer logo-z" viewBox="0 0 191.39 191.39">
                <path fill="#fff" d="M123.89,48.12h.2c.07,0,.13.02.19.02.16,0,.32.02.48.05.14.02.28.04.42.08.15.04.29.08.43.13.14.05.28.1.42.17.13.06.25.13.37.2.14.08.28.17.41.27.05.04.11.06.16.1.06.05.1.11.16.16.12.11.23.22.34.34.1.11.19.22.27.33.09.12.17.24.25.37.08.13.15.25.21.38.06.13.12.27.17.41.05.14.09.28.13.42.04.14.06.28.09.43.02.16.04.32.05.48,0,.08.02.15.02.22,0,.07-.02.13-.02.19,0,.16-.02.32-.05.48-.02.14-.04.28-.08.42-.04.15-.08.29-.13.43-.05.14-.1.28-.17.42-.06.13-.13.25-.2.37-.08.14-.17.28-.27.41-.04.05-.06.11-.11.16l-50.94,62.71h18.7l44.34-54.09c10.25-12.5,1.35-31.29-14.81-31.29h0s-.04,0-.06,0c-.01,0-.02,0-.03,0H54.8c-4.15,0-7.52,3.37-7.52,7.52v.17c0,4.15,3.37,7.52,7.52,7.52h69.09Z"/>
                <path fill="#fff" d="M67.34,127.43h-.25c-.07,0-.13-.02-.19-.02-.16,0-.32-.02-.48-.05-.14-.02-.28-.04-.42-.08-.14-.04-.29-.08-.43-.13-.14-.05-.29-.1-.42-.17-.13-.06-.25-.13-.37-.2-.14-.08-.28-.17-.41-.27-.05-.04-.11-.06-.16-.1-.06-.05-.1-.11-.16-.16-.12-.11-.24-.22-.34-.34-.1-.11-.19-.22-.27-.33-.09-.12-.17-.25-.25-.37-.08-.13-.15-.25-.21-.38-.06-.13-.12-.27-.17-.41-.05-.14-.09-.28-.13-.42-.04-.14-.06-.28-.09-.43-.02-.16-.04-.32-.05-.48,0-.08-.02-.15-.02-.22,0-.07.02-.13.02-.19,0-.16.02-.32.05-.48.02-.14.04-.28.08-.42.04-.15.08-.29.13-.43.05-.14.1-.28.17-.42.06-.13.13-.25.2-.37.08-.14.17-.28.27-.41.04-.05.06-.11.11-.16l50.94-62.71h-18.6l-44.23,53.96c-10.25,12.5-1.35,31.29,14.81,31.29h0c.05,0,.11,0,.16,0,.03,0,.06,0,.09,0h60.18s-3.12,3.12-3.12,3.12c-2.94,2.94-2.94,7.7,0,10.64s7.7,2.94,10.64,0l15.95-15.95c1.47-1.47,2.21-3.41,2.2-5.34,0-1.93-.73-3.86-2.2-5.34l-15.95-15.95c-2.94-2.94-7.7-2.94-10.64,0s-2.94,7.7,0,10.64l3.12,3.12-59.56-.04Z"/>
            </svg>
        </div>
    </div>

    <div class="controls">
        <button id="btn-1" class="active" onclick="playAnim(1)">1. Isometric Assembly</button>
        <button id="btn-2" onclick="playAnim(2)">2. 3D Coin Flip</button>
        <button id="btn-3" onclick="playAnim(3)">3. Dynamic Tilt & Draw</button>
        <button id="btn-4" onclick="playAnim(4)">4. Zoom Through</button>
        <button class="replay-btn" onclick="replay()">↻ Replay</button>
    </div>

    <script>
        function playAnim(num) {
            const sandbox = document.getElementById('sandbox');
            
            // Force browser reflow to restart the animation
            sandbox.className = 'sandbox-wrapper';
            void sandbox.offsetWidth; 
            
            // Apply new animation class
            sandbox.className = 'sandbox-wrapper anim-' + num;
            
            // Update button states
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + num).classList.add('active');
        }

        function replay() {
            const activeBtn = document.querySelector('button.active');
            if(activeBtn) {
                const num = activeBtn.id.replace('btn-', '');
                playAnim(num);
            }
        }

        // Play the first animation on load
        window.onload = () => playAnim(1);
    </script>
</body>
</html>
