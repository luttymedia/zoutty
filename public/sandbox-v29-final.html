<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoutty Logo Animation Sandbox</title>
    <style>
        body {
            background: #09090b;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .sandbox-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 0%, #06373A 0%, #021517 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .sandbox-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            background: #2dd4bf;
            opacity: 0;
            pointer-events: none;
        }

        .anim-active.sandbox-wrapper::before {
            animation: bg-fade 1.5s cubic-bezier(0.4, 0, 0.2, 1) both;
        }

        .zoutty-logo {
            width: 191.39px;
            height: 230.75px; 
            overflow: visible;
        }

        .logo-box {
            transform-origin: 95.69px 118.61px;
        }
        .anim-active .logo-box {
            animation: box-implode 4.5s cubic-bezier(0.8, 0, 0.2, 1) forwards;
        }

        /* The Moving Lines */
        .stroke-line {
            fill: none;
            stroke: #fff;
            stroke-width: 15px;
        }

        .line-1 {
            stroke-dasharray: calc(var(--snake-length-1) * 1px) 2000px;
            stroke-dashoffset: calc(var(--snake-length-1) * 1px);
            stroke-linecap: round; /* Circular head! */
        }
        .line-2 {
            stroke-dasharray: calc(var(--snake-length-2) * 1px) 2000px;
            stroke-dashoffset: calc(var(--snake-length-2) * 1px);
            stroke-linecap: butt;  /* Flat head (hidden under arrowhead) */
        }

        .anim-active .line-1 { animation: slide-snake-1 1.5s cubic-bezier(0.4, 0, 0.2, 1) both; animation-delay: 1.5s; }
        .anim-active .line-2 { animation: slide-snake-2 1.5s cubic-bezier(0.4, 0, 0.2, 1) both; animation-delay: 1.5s; }

        /* The Masks (Horizontal Trims) */
        .anim-active .mask-eraser-1 { animation: slide-mask-1 1.5s both; animation-delay: 1.5s; }
        .anim-active .mask-eraser-2 { animation: slide-mask-2 1.5s both; animation-delay: 1.5s; }

        /* The Arrowhead Mover */
        .arrow-mover {
            offset-path: path("M173.825,-4.603 L57.55,138.88 C51.34,146.55 56.81,157.99 66.68,157.98 L144.03,157.88");
            offset-rotate: auto;
            offset-distance: 0%;
            opacity: 0;
        }

        .anim-active .arrow-mover {
            animation: move-arrow 1.5s cubic-bezier(0.4, 0, 0.2, 1) both;
            animation-delay: 1.5s;
        }

        /* Final Logo Swap */
        .final-shapes {
            opacity: 0;
            visibility: hidden;
        }
        .anim-active .final-shapes {
            animation: show-final 0.01s forwards;
            animation-delay: 3.0s;
        }

        /* Glow Explosion (Ghost Burst) */
        .glow-shapes {
            opacity: 0;
            visibility: hidden;
            transform-origin: 95.69px 118.61px;
            pointer-events: none;
        }
        .anim-active .glow-shapes {
            animation: glow-explode 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            animation-delay: 3.0s;
        }
        .anim-active .anim-guides {
            animation: hide-guides 0.01s forwards;
            animation-delay: 3.0s;
        }

        @keyframes bg-fade {
            0%, 15% { opacity: 1; }
            30%, 100% { opacity: 0; }
        }

        @keyframes box-implode {
            0%, 15% { transform: scale(30) rotate(180deg); animation-timing-function: cubic-bezier(0.2, 0.8, 0.2, 1); }
            30% { transform: scale(0.95) rotate(-5deg); animation-timing-function: ease-in-out; }
            33% { transform: scale(1.02) rotate(2deg); animation-timing-function: ease-in-out; }
            38%, 100% { transform: scale(1) rotate(0deg); }
        }

        @keyframes slide-snake-1 {
            0% { stroke-dashoffset: calc(var(--snake-length-1) * 1px); }
            100% { stroke-dashoffset: calc(-1px * (var(--track-length-1) - var(--snake-length-1))); }
        }
        @keyframes slide-snake-2 {
            0% { stroke-dashoffset: calc(var(--snake-length-2) * 1px); }
            100% { stroke-dashoffset: calc(-1px * (var(--track-length-2) - var(--snake-length-2))); }
        }

        @keyframes slide-mask-1 {
            0% { transform: translateY(var(--clip-y-start-1)); animation-timing-function: ease-in-out; }
            50%, 100% { transform: translateY(var(--clip-y-end-1)); }
        }
        @keyframes slide-mask-2 {
            0% { transform: translateY(var(--clip-y-start-2)); animation-timing-function: ease-in-out; }
            50%, 100% { transform: translateY(var(--clip-y-end-2)); }
        }

        @keyframes move-arrow {
            0% { offset-distance: 0%; opacity: 1; }
            99% { offset-distance: 100%; opacity: 1; }
            100% { offset-distance: 100%; opacity: 1; }
        }

        @keyframes hide-guides {
            to { opacity: 0; visibility: hidden; }
        }
        @keyframes show-final {
            to { opacity: 1; visibility: visible; }
        }

        @keyframes glow-explode {
            0%, 0.99% { 
                opacity: 0; 
                visibility: hidden; 
                transform: scale(1); 
                filter: brightness(1) blur(0px); 
            }
            1% { 
                opacity: 1; 
                visibility: visible; 
                transform: scale(1.02); 
                filter: brightness(2) blur(2px) drop-shadow(0 0 20px #fff); 
            }
            100% { 
                opacity: 0; 
                visibility: hidden; 
                transform: scale(1.3); 
                filter: brightness(1) blur(10px) drop-shadow(0 0 0px transparent); 
            }
        }

        /* OUTRO ANIMATIONS (Pure CSS) */
        .outro-active.sandbox-wrapper { animation: outro-wrapper 0.9s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .outro-active .logo-box { animation: outro-box 0.9s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        
        /* Cancel intro hiding animations so the lines come back */
        .outro-active .anim-guides {
            animation: none !important;
            opacity: 1 !important;
            visibility: visible !important;
        }
        .outro-active .final-shapes,
        .outro-active .glow-shapes {
            animation: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
        }

        .outro-active .line-1 { animation: outro-array-1 0.9s cubic-bezier(0.4, 0, 0.2, 1) forwards, outro-offset-1 0.9s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .outro-active .line-2 { animation: outro-array-2 0.9s cubic-bezier(0.4, 0, 0.2, 1) forwards, outro-offset-2 0.9s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        .outro-active .arrow-mover { animation: outro-arrow 0.9s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        @keyframes outro-offset-1 {
            0%, 20% { stroke-dashoffset: -94.03px; }
            100% { stroke-dashoffset: -1146.86px; }
        }
        @keyframes outro-array-1 {
            0% { stroke-dasharray: 183px 2000px; }
            10% { stroke-dasharray: 175px 2000px; }
            20%, 100% { stroke-dasharray: 183px 2000px; }
        }
        @keyframes outro-offset-2 {
            0%, 20% { stroke-dashoffset: -88.03px; }
            100% { stroke-dashoffset: -1148.28px; }
        }
        @keyframes outro-array-2 {
            0% { stroke-dasharray: 189px 2000px; }
            10% { stroke-dasharray: 181px 2000px; }
            20%, 100% { stroke-dasharray: 189px 2000px; }
        }
        @keyframes outro-arrow {
            0% { offset-distance: 24.13%; }
            10% { offset-distance: 23.43%; }
            20% { offset-distance: 24.13%; }
            100% { offset-distance: 100%; }
        }
        @keyframes outro-box {
            0%, 30% { transform: scale(1) rotate(0deg); opacity: 1; }
            55% { transform: scale(1.02) rotate(-2deg); opacity: 1; animation-timing-function: ease-in-out; }
            70% { transform: scale(0.95) rotate(5deg); opacity: 1; animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
            100% { transform: scale(40) rotate(-180deg); opacity: 0; }
        }
        @keyframes outro-wrapper {
            0%, 80% { opacity: 1; }
            100% { opacity: 0; }
        }

        .controls { 
            position: absolute; 
            bottom: 40px; 
            z-index: 20; 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
        }
        .controls-row {
            display: flex;
            gap: 15px;
        }
        button { padding: 12px 20px; background: #2dd4bf; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button.outro-btn { background: #f43f5e; color: white; }

        .version-badge {
            position: fixed;
            top: 16px;
            left: 16px;
            background: #2dd4bf;
            color: #000;
            font-weight: bold;
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 6px;
            z-index: 9999;
            font-family: monospace;
            letter-spacing: 0.05em;
        }
    </style>
</head>

    <script>
        const root = document.documentElement;

        // Fixed snake lengths (sliders removed)
        const SNAKE_LEN_1 = 183;
        const SNAKE_LEN_2 = 189;
        root.style.setProperty('--snake-length-1', SNAKE_LEN_1);
        root.style.setProperty('--snake-length-2', SNAKE_LEN_2);

        let isOutro = false;
        let outroTimer = null;
        let outroStartTime = 0;

        // Custom Bezier Solver for the Recoil (Anticipation)
        function solveBezier(x, x1, y1, x2, y2) {
            if (x === 0 || x === 1) return x;
            let t = x;
            for (let i = 0; i < 8; i++) {
                let ft = 3*Math.pow(1-t,2)*t*x1 + 3*(1-t)*Math.pow(t,2)*x2 + Math.pow(t,3) - x;
                if (Math.abs(ft) < 0.001) break;
                let dt = 3*Math.pow(1-t,2)*x1 - 6*t*(1-t)*x1 + 6*t*(1-t)*x2 - 3*Math.pow(t,2)*x2 + 3*Math.pow(t,2);
                t -= ft/dt;
            }
            return 3*Math.pow(1-t,2)*t*y1 + 3*(1-t)*Math.pow(t,2)*y2 + Math.pow(t,3);
        }

        function calculateTrimPositions() {
            const line1 = document.getElementById('guide-1');
            const line2 = document.getElementById('guide-2');
            
            // Force layout flush so getTotalLength returns correct updated value
            void line1.getBoundingClientRect();
            
            const trackLen1 = line1.getTotalLength() || 277.03;
            const trackLen2 = line2.getTotalLength() || 277.03;
            root.style.setProperty('--track-length-1', trackLen1);
            root.style.setProperty('--track-length-2', trackLen2);

            const snakeLen1 = SNAKE_LEN_1;
            const snakeLen2 = SNAKE_LEN_2;
            
            const pt0_1 = line1.getPointAtLength(0);
            const pt1_1 = line1.getPointAtLength(1);
            const dirY_1 = (pt1_1.y - pt0_1.y); 
            const startY_1 = pt0_1.y + dirY_1 * (-snakeLen1);
            const endY_1 = line1.getPointAtLength(Math.max(0, trackLen1 - snakeLen1)).y;

            root.style.setProperty('--clip-y-start-1', (startY_1 - 8) + 'px');
            root.style.setProperty('--clip-y-end-1', (endY_1 - 8) + 'px');

            const pt0_2 = line2.getPointAtLength(0);
            const pt1_2 = line2.getPointAtLength(1);
            const dirY_2 = (pt1_2.y - pt0_2.y); 
            const startY_2 = pt0_2.y + dirY_2 * (-snakeLen2);
            const endY_2 = line2.getPointAtLength(Math.max(0, trackLen2 - snakeLen2)).y;

            root.style.setProperty('--clip-y-start-2', (startY_2 + 8) + 'px');
            root.style.setProperty('--clip-y-end-2', (endY_2 + 8) + 'px');
        }

        function playAnim() {
            clearTimeout(outroTimer);
            const wrapper = document.getElementById('sandbox');
            
            if (isOutro) {
                // Completely Reset Outro State to prepare for Intro
                isOutro = false;
                wrapper.classList.remove('outro-active');
                wrapper.style.opacity = '1';
                document.querySelector('.final-shapes').style.display = '';
                document.getElementById('BOX').style.transform = '';
                document.getElementById('BOX').style.animation = '';
                
                const line1 = document.getElementById('guide-1');
                const line2 = document.getElementById('guide-2');
                const arrowMover = document.querySelector('.arrow-mover');
                
                // Re-add clip path to trap lines inside the box
                document.getElementById('clip-wrapper').setAttribute('clip-path', 'url(#box-clip)');
                
                // Restore Original Paths
                line1.setAttribute('d', 'M12.86,231.88 L133.73,82.44 C139.91,74.8 134.46,63.41 124.63,63.42 L54.80,63.52');
                line2.setAttribute('d', 'M173.825,-4.603 L57.55,138.88 C51.34,146.55 56.81,157.99 66.68,157.98 L144.03,157.88');
                arrowMover.style.offsetPath = 'path("M173.825,-4.603 L57.55,138.88 C51.34,146.55 56.81,157.99 66.68,157.98 L144.03,157.88")';
                
                // Restore Original Masks
                line1.setAttribute('mask', 'url(#trim-1)');
                line2.setAttribute('mask', 'url(#trim-2)');
                
                // Clear JS styles
                line1.style = '';
                line2.style = '';
                arrowMover.style = '';
                document.querySelector('.mask-eraser-1').style = '';
                document.querySelector('.mask-eraser-2').style = '';
                document.querySelector('.mask-eraser-1').removeAttribute('transform');
                document.querySelector('.mask-eraser-2').removeAttribute('transform');
            }

            wrapper.classList.remove('anim-active');
            void wrapper.offsetWidth; 
            calculateTrimPositions();
            
            document.querySelectorAll('*').forEach(el => el.style.animationDelay = '');
            wrapper.classList.add('anim-active');
            
            // Automatically trigger the Outro sequence right after the logo glow finishes
            outroTimer = setTimeout(playOutro, 4500);
        }

        function playOutro() {
            if (isOutro) return; 
            isOutro = true;
            
            const line1 = document.getElementById('guide-1');
            const line2 = document.getElementById('guide-2');
            const arrowMover = document.querySelector('.arrow-mover');
            
            // 1. Hide Final Logo & Re-show Guides
            document.querySelector('.final-shapes').style.display = 'none';
            document.querySelector('.anim-guides').style.opacity = '1';
            document.querySelector('.anim-guides').style.visibility = 'visible';
            arrowMover.style.opacity = '1';
            
            // 2. Extend Paths Horizontally (Shooting out of the box)
            line1.setAttribute('d', 'M12.86,231.88 L133.73,82.44 C139.91,74.8 134.46,63.41 124.63,63.42 L-800,63.52');
            line2.setAttribute('d', 'M173.825,-4.603 L57.55,138.88 C51.34,146.55 56.81,157.99 66.68,157.98 L1000,157.88');
            arrowMover.style.offsetPath = 'path("M173.825,-4.603 L57.55,138.88 C51.34,146.55 56.81,157.99 66.68,157.98 L1000,157.88")';
            
            // 3. Trigger Pure CSS Outro Animations!
            // We KEEP 'anim-active' so the Intro masks stay perfectly frozen in their final CSS position!
            // The .outro-active class applies the new keyframes defined at the bottom of our stylesheet.
            document.getElementById('sandbox').classList.add('outro-active');
        }

        window.onload = () => {
            calculateTrimPositions();
            playAnim();
        };
    </script>
</body>
</html>
